server.port=8080
spring.application.name=fundamentos01
spring.datasource.url=jdbc:postgresql://localhost:5432/fundamentos01_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============== CONFIGURACIÓN DE JWT ==============
jwt.secret=mySecretKeyForJWT2024MustBeAtLeast256BitsLongForHS256Algorithm
jwt.expiration=1800000
jwt.refresh-expiration=604800000
jwt.issuer=fundamentos01-api
jwt.header=Authorization
jwt.prefix=Bearer 
